appId: com.copilot.plugin-manager
productName: Copilot Plugin Manager
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - src/electron/**/*
  - public/**/*
  - package.json
  - "!**/*.test.*"
  - "!**/tsconfig*"
  - "!**/vite*"
  - "!**/vitest*"
  - "!src/client/**"
  - "!src/server/**"
  - "!docs/**"
asarUnpack:
  - dist/**/*
extraResources:
  - from: public/
    to: public/
    filter:
      - "**/*"
  - from: dist/server/
    to: dist/server/
    filter:
      - "**/*"
  - from: dist/client/
    to: dist/client/
    filter:
      - "**/*"
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
win:
  icon: build/icon.png
  target:
    - nsis
linux:
  icon: build/icon.png
  target:
    - AppImage
    - deb
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
