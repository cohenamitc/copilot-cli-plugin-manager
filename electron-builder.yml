appId: com.copilot.plugin-manager
productName: Copilot Plugin Manager
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - src/electron/**/*
  - public/**/*
  - package.json
  - "!**/*.test.*"
  - "!**/tsconfig*"
  - "!**/vite*"
  - "!**/vitest*"
  - "!src/client/**"
  - "!src/server/**"
  - "!docs/**"
extraResources:
  - from: public/
    to: public/
    filter:
      - "**/*"
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - dmg
    - zip
win:
  icon: build/icon.png
  target:
    - nsis
linux:
  icon: build/icon.png
  target:
    - AppImage
    - deb
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
